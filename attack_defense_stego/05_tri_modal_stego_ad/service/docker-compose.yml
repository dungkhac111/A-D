name: 05_tri_modal_stego_ad
services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8088:8088"
    environment:
      - PORT=8088
      - CHECKER_TOKEN=checker-secret
    volumes:
      - ad-data:/app/data
    restart: unless-stopped
volumes:
  ad-data:

